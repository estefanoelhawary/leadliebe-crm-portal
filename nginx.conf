server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Kundenportal bleibt privat, nicht einbettbar und ohne Browser-Rechte, die
  # diese reine CRM-Oberfläche nicht benötigt.
  add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

  # SPA-Fallback (react-admin Hash-Router braucht es kaum, aber sauber)
  location / {
    expires -1;
    try_files $uri $uri/ /index.html;
  }
  # Statische Assets lang cachen (versioniert), HTML nie
  location /assets/ {
    expires 1y;
    try_files $uri =404;
  }
  location = /index.html {
    expires -1;
  }
  location = /auth-callback.html {
    expires -1;
  }
  location = /sw.js {
    expires -1;
  }
  location = /registerSW.js {
    expires -1;
  }
}
